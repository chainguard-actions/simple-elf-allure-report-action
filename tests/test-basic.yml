name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create allure results directory with sample data
        run: |
          mkdir -p allure-results
          cat > allure-results/sample-result.json << 'EOF'
          {
            "uuid": "test-uuid-1234",
            "historyId": "test-history-id",
            "name": "Sample Test",
            "status": "passed",
            "stage": "finished",
            "start": 1700000000000,
            "stop": 1700000001000
          }
          EOF

      - name: Create gh-pages directory
        run: |
          mkdir -p gh-pages

      - id: action
        uses: .
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: '20'
          github_run_num: '1'
          github_run_id: '123456789'
          github_repo: 'test-owner/test-repo'
          github_repo_owner: 'test-owner'
          github_tests_repo: 'test-owner/test-repo'
          github_server_url: 'https://github.com'

      - name: Assert allure-history directory was created
        run: |
          echo "Checking allure-history directory..."
          if [ ! -d "allure-history" ]; then
            echo "FAIL: allure-history directory was not created"
            exit 1
          fi
          echo "PASS: allure-history directory exists"
