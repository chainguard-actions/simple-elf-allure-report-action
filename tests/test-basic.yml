name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up allure-results directory
        run: |
          mkdir -p allure-results
          cp -r $GITHUB_WORKSPACE/actions/hardened/simple-elf--allure-report-action/v1.14/allure-results/. allure-results/

      - name: Set up gh-pages directory
        run: |
          mkdir -p gh-pages
          mkdir -p gh-pages/last-history

      - id: action
        uses: .
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: '20'
          github_run_num: '1'
          github_run_id: '12345'
          github_repo: 'test-owner/test-repo'
          github_repo_owner: 'test-owner'
          github_tests_repo: 'test-owner/test-repo'
          github_server_url: 'https://github.com'

      - name: Assert allure-report was generated
        run: |
          echo "Checking allure-report directory..."
          if [ ! -d "allure-report" ]; then
            echo "FAIL: allure-report directory was not created"
            exit 1
          fi
          if [ ! -f "allure-report/index.html" ]; then
            echo "FAIL: allure-report/index.html was not created"
            exit 1
          fi
          echo "PASS: allure-report/index.html exists"

      - name: Assert allure-history was created
        run: |
          echo "Checking allure-history directory..."
          if [ ! -d "allure-history" ]; then
            echo "FAIL: allure-history directory was not created"
            exit 1
          fi
          if [ ! -d "allure-history/1" ]; then
            echo "FAIL: allure-history/1 directory was not created"
            exit 1
          fi
          echo "PASS: allure-history/1 exists"

      - name: Assert allure-history index.html redirect
        run: |
          echo "Checking allure-history/index.html..."
          if [ ! -f "allure-history/index.html" ]; then
            echo "FAIL: allure-history/index.html was not created"
            exit 1
          fi
          CONTENT=$(cat allure-history/index.html)
          echo "Content: $CONTENT"
          if echo "$CONTENT" | grep -q "test-owner.github.io/test-repo"; then
            echo "PASS: index.html contains correct URL"
          else
            echo "FAIL: index.html does not contain expected URL"
            exit 1
          fi
