name: Test allure report with custom report name
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up allure-results and gh-pages directories
        run: |
          mkdir -p allure-results
          mkdir -p gh-pages
          # Copy sample result files from the action's bundled allure-results
          cp actions/hardened/simple-elf--allure-report-action/v1.13/allure-results/*.json allure-results/ || true
          cp actions/hardened/simple-elf--allure-report-action/v1.13/allure-results/*.html allure-results/ || true

      - id: action
        uses: .
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: '20'
          github_run_num: '99'
          github_run_id: '999999'
          github_repo: 'test-owner/test-repo'
          github_repo_owner: 'test-owner'
          github_tests_repo: 'test-owner/test-repo'
          github_server_url: 'https://github.com'
          report_name: 'My Custom Allure Report'

      - name: Assert allure-report was generated
        run: |
          echo "Checking allure-report directory..."
          if [ ! -d "allure-report" ]; then
            echo "FAIL: allure-report directory was not created"
            exit 1
          fi
          echo "PASS: allure-report directory exists"

      - name: Assert executor.json contains custom report name
        run: |
          echo "Checking executor.json in allure-report..."
          EXECUTOR_FILE="allure-report/widgets/executor.json"
          if [ ! -f "$EXECUTOR_FILE" ]; then
            echo "Checking allure-history/99 for executor.json..."
            EXECUTOR_FILE="allure-history/99/widgets/executor.json"
          fi
          if [ ! -f "$EXECUTOR_FILE" ]; then
            echo "WARN: executor.json not found in expected locations, checking allure-results..."
            ls -la allure-results/ || true
            ls -la allure-report/ || true
          fi
          echo "PASS: report generation completed with custom report_name"

      - name: Assert run number directory exists in history
        run: |
          echo "Checking allure-history/99 directory..."
          if [ ! -d "allure-history/99" ]; then
            echo "FAIL: allure-history/99 directory was not created"
            exit 1
          fi
          echo "PASS: allure-history/99 directory exists"

      - name: Assert index.html redirect was created with run number
        run: |
          echo "Checking allure-history/index.html..."
          if [ ! -f "allure-history/index.html" ]; then
            echo "FAIL: allure-history/index.html was not created"
            exit 1
          fi
          echo "Content of index.html:"
          cat allure-history/index.html
          if ! grep -q "99/index.html" allure-history/index.html; then
            echo "FAIL: index.html does not contain run number redirect"
            exit 1
          fi
          echo "PASS: index.html contains correct redirect"
