name: Test allure report with report_name and optional inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create allure results directory with sample data
        run: |
          mkdir -p allure-results
          cat > allure-results/sample-result.json << 'EOF'
          {
            "uuid": "test-uuid-5678",
            "historyId": "test-history-id-2",
            "name": "Named Report Test",
            "status": "passed",
            "stage": "finished",
            "start": 1700000000000,
            "stop": 1700000002000
          }
          EOF
          mkdir -p gh-pages
          mkdir -p gh-pages/my-subfolder

      - id: action
        uses: .
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history
          subfolder: 'my-subfolder'
          keep_reports: '10'
          github_run_num: '2'
          github_run_id: '987654321'
          github_repo: 'test-owner/test-repo'
          github_repo_owner: 'test-owner'
          github_tests_repo: 'test-owner/test-repo'
          report_url: 'https://reports.example.com'
          github_server_url: 'https://github.com'
          report_name: 'My Custom Allure Report'

      - name: Assert allure-history directory was created
        run: |
          echo "Checking allure-history directory..."
          if [ ! -d "allure-history" ]; then
            echo "FAIL: allure-history directory was not created"
            exit 1
          fi
          echo "PASS: allure-history directory exists"

      - name: Assert allure-report directory was created
        run: |
          echo "Checking allure-report directory..."
          if [ ! -d "allure-report" ]; then
            echo "FAIL: allure-report directory was not created"
            exit 1
          fi
          echo "PASS: allure-report directory exists"
