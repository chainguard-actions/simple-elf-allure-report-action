name: Test custom report name
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up allure-results directory
        run: |
          mkdir -p allure-results
          cp -r $GITHUB_WORKSPACE/actions/hardened/simple-elf--allure-report-action/v1.14/allure-results/. allure-results/

      - name: Set up gh-pages directory
        run: |
          mkdir -p gh-pages
          mkdir -p gh-pages/last-history

      - id: action
        uses: .
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: '20'
          github_run_num: '42'
          github_run_id: '99999'
          github_repo: 'my-org/my-project'
          github_repo_owner: 'my-org'
          github_tests_repo: 'my-org/my-project'
          github_server_url: 'https://github.com'
          report_name: 'My Custom Test Report'

      - name: Assert allure-report was generated
        run: |
          echo "Checking allure-report directory..."
          if [ ! -d "allure-report" ]; then
            echo "FAIL: allure-report directory was not created"
            exit 1
          fi
          if [ ! -f "allure-report/index.html" ]; then
            echo "FAIL: allure-report/index.html was not created"
            exit 1
          fi
          echo "PASS: allure-report/index.html exists"

      - name: Assert allure-history run directory was created
        run: |
          echo "Checking allure-history/42 directory..."
          if [ ! -d "allure-history/42" ]; then
            echo "FAIL: allure-history/42 directory was not created"
            exit 1
          fi
          echo "PASS: allure-history/42 exists"

      - name: Assert custom report name in executor.json
        run: |
          echo "Checking executor.json in allure-report..."
          EXECUTOR_FILE="allure-report/widgets/executor.json"
          if [ ! -f "$EXECUTOR_FILE" ]; then
            echo "FAIL: $EXECUTOR_FILE was not found"
            exit 1
          fi
          CONTENT=$(cat "$EXECUTOR_FILE")
          echo "Content: $CONTENT"
          if echo "$CONTENT" | grep -q "My Custom Test Report"; then
            echo "PASS: executor.json contains custom report name"
          else
            echo "FAIL: executor.json does not contain 'My Custom Test Report'"
            exit 1
          fi
